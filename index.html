<script>
// PWA install prompt
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install button if available
  setTimeout(() => {
    if(deferredPrompt && document.getElementById("installBtn")) {
      document.getElementById("installBtn").style.display = "flex";
    }
  }, 2000);
});
window.addEventListener("appinstalled", () => {
  deferredPrompt = null;
  const btn = document.getElementById("installBtn");
  if(btn) btn.style.display = "none";
});
function installApp() {
  if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>deferredPrompt=null); }
}
if("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/budzetdomowy/sw.js").catch(()=>{});
}
</script>

<script>
// ── Firebase init ─────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyBKW8-Uc-NEuRBmuP4dsLT1PYaTA3JNXCk",
  authDomain:"budzet-domowy-fead9.firebaseapp.com",
  databaseURL:"https://budzet-domowy-fead9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"budzet-domowy-fead9",
  storageBucket:"budzet-domowy-fead9.firebasestorage.app",
  messagingSenderId:"108516278201",
  appId:"1:108516278201:web:9617eecd327ac584f20068"
});
const db   = firebase.database();
const auth = firebase.auth();

// ── Constants ─────────────────────────────────────────────────────────────────
const PERSONS = ["Osoba 1","Osoba 2","Wspólne"];
const CATS = ["🏠 Mieszkanie","🛒 Jedzenie","🚗 Transport","💡 Rachunki","🎬 Rozrywka","👕 Ubrania","💊 Zdrowie","📚 Edukacja","✈️ Wakacje","🔧 Naprawy","💰 Oszczędności","🐶 Talia","👩 Magda","👨 Sebastian","❓ Inne"];
const MONTHS = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const C = {inc:"#22c55e",exp:"#ef4444",p1:"#6366f1",p2:"#f59e0b",sh:"#8b5cf6",bg:"#0f172a",card:"#1e293b",bdr:"#334155",txt:"#f1f5f9",mut:"#94a3b8",acc:"#38bdf8"};
const CC = ["#6366f1","#f59e0b","#ef4444","#22c55e","#8b5cf6","#ec4899","#14b8a6","#f97316","#06b6d4","#84cc16","#a78bfa","#94a3b8","#f43f5e","#0ea5e9","#64748b"];
const fmt = n => new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN"}).format(n||0);
const el = id => document.getElementById(id);
const now = new Date();

// ── State ─────────────────────────────────────────────────────────────────────
let STATE = {
  view:"dashboard", fM:now.getMonth(), fY:now.getFullYear(),
  txs:[], reps:[], excl:[], recurring:[], names:["Osoba 1","Osoba 2"],
  editId:null, recEditId:null, repAmt:"", repFrom:"Osoba 1",
  syncStatus:"connecting", form:defForm(), recForm:defRecForm(),
  pieChart:null, barChart:null,
  expandedBudget0:false, expandedBudget1:false
};

function defForm(){ return {type:"expense",amount:"",category:CATS[1],person:PERSONS[0],description:"",day:now.getDate(),month:now.getMonth(),year:now.getFullYear(),excludeFromSettlement:false}; }
function defRecForm(){ return {name:"",amount:"",category:CATS[4],person:PERSONS[2],day:1}; }

// ── Firebase helpers ──────────────────────────────────────────────────────────
function fbSet(path,val){
  return db.ref(path).set(val)
    .then(()=>{ if(STATE.syncStatus!=="connected") setState({syncStatus:"connected"}); })
    .catch(()=>setState({syncStatus:"offline"}));
}
function fbDel(path){
  return db.ref(path).remove()
    .then(()=>{ if(STATE.syncStatus!=="connected") setState({syncStatus:"connected"}); })
    .catch(()=>setState({syncStatus:"offline"}));
}

// ── Render engine ─────────────────────────────────────────────────────────────
function setState(patch){ Object.assign(STATE,patch); render(); }

function render(){
  const s = STATE;
  const root = el("root");
  // ── Login ──────────────────────────────────────────────────────────────────
  if(!s.authed){
    root.innerHTML = `
    <div class="fa" style="width:100%;max-width:340px;padding:24px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:52px">💰</div>
        <div style="font-size:22px;font-weight:800;color:${C.acc};margin-top:8px">Budżet Domowy</div>
        <div style="font-size:13px;color:${C.mut};margin-top:4px">Zaloguj się aby uzyskać dostęp</div>
      </div>
      <div class="card" style="display:flex;flex-direction:column;gap:14px">
        <div>
          <label style="font-size:11px;color:${C.mut};font-weight:600;display:block;margin-bottom:5px">Hasło</label>
          <input class="inp" type="password" id="loginPw" placeholder="Wpisz hasło…" autocomplete="current-password"/>
        </div>
        <div id="loginErr" class="hide" style="padding:9px 12px;border-radius:10px;background:#2d1515;color:#fca5a5;font-size:12px"></div>
        <button id="loginBtn" onclick="doLogin()" style="padding:12px;border-radius:10px;font-weight:700;background:${C.acc};color:#0f172a;font-size:14px;width:100%">
          🔓 Zaloguj się
        </button>
      </div>
    </div>`;
    el("loginPw").onkeydown = e => { if(e.key==="Enter") doLogin(); };
    setTimeout(()=>el("loginPw")?.focus(),100);
    return;
  }

  const filtered = s.txs.filter(t=>t.month===s.fM&&t.year===s.fY);
  const settle = calcSettlement(filtered);
  const cd = catData(filtered);
  const tot = totals(filtered);

  // adjusted balance
  const monthRepsAll = s.reps.filter(r=>r.month===s.fM&&r.year===s.fY);
  const repaidAll = settle ? monthRepsAll.filter(r=>r.from===settle.debtorP).reduce((a,r)=>a+r.amount,0) : 0;
  const adjBal = (tot.inc - tot.exp) + repaidAll;

  const syncCol = {connected:C.inc,offline:C.exp,connecting:C.mut}[s.syncStatus]||C.mut;
  const syncLbl = {connected:"Zsynchronizowano",offline:"Brak połączenia",connecting:"Łączenie…"}[s.syncStatus]||"";
  const pColors = [C.p1,C.p2,C.sh];
  const navItems = [["dashboard","📊","Przegląd"],["personal","👤","Mój budżet"],["transactions","📋","Transakcje"],["stats","📈","Wykresy"],["add","➕","Dodaj"],["recurring","🔄","Cykliczne"],["settings","⚙️","Ustawienia"]];

  root.innerHTML = `
  <div style="background:${C.bg};min-height:100vh;width:100%;overflow-x:clip">

    <!-- Header -->
    <div style="background:${C.card};border-bottom:1px solid ${C.bdr};padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;left:0;right:0;box-sizing:border-box;width:100%">
      <div>
        <div style="font-weight:800;font-size:16px;color:${C.acc}">💰 Budżet Domowy</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${syncCol};margin-top:2px">
          <span style="width:6px;height:6px;border-radius:50%;background:${syncCol};display:inline-block;${s.syncStatus==='connecting'?'animation:pulse 1.2s infinite':''}"></span>
          ${syncLbl}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="installBtn" onclick="installApp()" title="Zainstaluj aplikację"
          style="display:none;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;background:#38bdf822;border:1px solid #38bdf844;color:#38bdf8;font-size:11px;font-weight:600">
          📲 Zainstaluj
        </button>
        <div id="headerRight">${renderHeaderRight()}</div>
      </div>
    </div>

    <!-- Month nav -->
    <div style="background:${C.card};border-bottom:1px solid ${C.bdr};padding:8px 16px;display:flex;align-items:center;width:100%;box-sizing:border-box">
      <button onclick="prevMonth()" style="color:${C.mut};font-size:22px;padding:0 8px">‹</button>
      <span style="flex:1;text-align:center;font-weight:700;font-size:14px">${MONTHS[s.fM]} ${s.fY}</span>
      <button onclick="nextMonth()" style="color:${C.mut};font-size:22px;padding:0 8px">›</button>
    </div>

    <!-- Nav tabs -->
    <div style="display:flex;border-bottom:1px solid ${C.bdr};background:${C.card};width:100%;box-sizing:border-box">
      ${navItems.map(([v,ico,lbl])=>`
        <button onclick="navTo('${v}')" style="flex:1;padding:8px 0 6px;font-size:10px;font-weight:600;
          color:${s.view===v?C.acc:C.mut};border-bottom:2px solid ${s.view===v?C.acc:'transparent'};background:transparent;
          min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;box-sizing:border-box">
          <div style="font-size:18px;line-height:1.2">${ico}</div>
          <div style="overflow:hidden;text-overflow:ellipsis;padding:0 2px">${lbl}</div>
        </button>`).join("")}
    </div>

    <div style="padding:14px 14px 32px;max-width:520px;margin:0 auto" class="fa">
      ${renderView(filtered, settle, cd, tot, adjBal)}
    </div>
  </div>`;

  // Render charts after DOM update
  if(s.view==="stats") setTimeout(()=>renderCharts(cd), 50);
}

function renderHeaderRight(){
  const s = STATE;
  if(s.editNames) return `
    <div style="display:flex;gap:6px;align-items:center">
      <input class="inp" id="n0" value="${s.names[0]}" style="width:74px;font-size:12px;padding:6px 8px"/>
      <input class="inp" id="n1" value="${s.names[1]}" style="width:74px;font-size:12px;padding:6px 8px"/>
      <button onclick="saveNames()" style="background:${C.acc};color:#0f172a;border-radius:6px;padding:6px 10px;font-weight:700;font-size:12px">✓</button>
      <button onclick="setState({editNames:false})" style="background:#334155;color:${C.mut};border-radius:6px;padding:6px 8px">✕</button>
    </div>`;
  return `<div style="display:flex;gap:10px;align-items:center">
    <button onclick="setState({editNames:true,tmpNames:[...STATE.names]})" style="color:${C.mut};font-size:12px">✏️ Imiona</button>
    <button onclick="auth.signOut()" style="color:#ef444488;font-size:13px" title="Wyloguj">🔒</button>
  </div>`;
}

function renderView(filtered, settle, cd, tot, adjBal){
  const s = STATE;
  switch(s.view){
    case "dashboard": return renderDashboard(filtered, settle, cd, tot, adjBal);
    case "transactions": return renderTransactions(filtered);
    case "personal": return renderPersonal(filtered);
    case "stats": return renderStats(cd);
    case "add": return renderAdd();
    case "recurring": return renderRecurring();
    case "settings": return renderSettings();
    default: return "";
  }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(filtered, settle, cd, tot, adjBal){
  const s = STATE;
  const monthRepsAll = s.reps.filter(r=>r.month===s.fM&&r.year===s.fY);
  const p1rep = monthRepsAll.filter(r=>r.from===PERSONS[0]).reduce((a,r)=>a+r.amount,0);
  const p2rep = monthRepsAll.filter(r=>r.from===PERSONS[1]).reduce((a,r)=>a+r.amount,0);

  const summaryCards = [["↑ Przychody",tot.inc,C.inc],["↓ Wydatki",tot.exp,C.exp],["= Bilans",adjBal,adjBal>=0?C.inc:C.exp]]
    .map(([l,v,col])=>`<div class="card" style="padding:12px"><div style="font-size:10px;color:${C.mut};margin-bottom:4px">${l}</div><div style="font-weight:700;font-size:13px;color:${col}">${fmt(v)}</div></div>`).join("");

  const personRows = [0,1].map(i=>{
    const col = [C.p1,C.p2,C.sh][i];
    const label = s.names[i];
    const pt = totals(filtered.filter(t=>t.person===PERSONS[i]));
    const repPaid = i===0?p1rep:p2rep;
    const repRcv  = i===0?p2rep:p1rep;
    const adjExp  = pt.exp + repPaid - repRcv;
    const repNote = (repPaid>0||repRcv>0) ? `<span style="font-size:10px;color:${C.mut};font-style:italic">(${repPaid>0?"+":""}${fmt(repPaid-repRcv)} spłata)</span>` : "";
    return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${i===0?10:0}px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${col}"></div>
        <span style="font-size:14px">${label}</span>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:${C.inc}">+${fmt(pt.inc)}</div>
        <div style="font-size:11px;color:${C.exp};display:flex;align-items:center;gap:4px;justify-content:flex-end">-${fmt(adjExp)} ${repNote}</div>
      </div>
    </div>`;
  }).join("");

  const topCats = cd.slice(0,5).map((c,i)=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span>${c.name}</span><b style="color:${C.exp}">${fmt(c.v)}</b>
      </div>
      <div style="height:5px;border-radius:4px;background:#334155">
        <div style="height:5px;border-radius:4px;background:${CC[i]};width:${(c.v/cd[0].v)*100}%;transition:width .4s"></div>
      </div>
    </div>`).join("");

  return `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">${summaryCards}</div>
      <div class="card"><div style="font-weight:600;font-size:13px;color:${C.mut};margin-bottom:12px">Podział per osoba</div>${personRows}</div>
      ${renderPersonalBudgets(filtered)}
      ${settle ? renderSettle(settle) : ""}
      ${cd.length>0?`<div class="card"><div style="font-weight:600;font-size:13px;color:${C.mut};margin-bottom:12px">Top kategorie wydatków</div>${topCats}</div>`:""}
    </div>`;
}

function renderPersonalBudgets(filtered){
  const s = STATE;
  const expanded0 = s.expandedBudget0;
  const expanded1 = s.expandedBudget1;

  function budgetCard(i){
    const col = [C.p1,C.p2][i];
    const name = s.names[i];
    const expanded = i===0 ? expanded0 : expanded1;
    const myTxs = filtered.filter(t=>t.person===PERSONS[i]);
    const sharedTxs = filtered.filter(t=>t.person==="Wspólne");
    const myInc  = myTxs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
    const myExp  = myTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
    const sharedHalf = sharedTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0)/2;
    const totalExp = myExp + sharedHalf;
    const monthRepsP = s.reps.filter(r=>r.month===s.fM&&r.year===s.fY);
    const repPaid = monthRepsP.filter(r=>r.from===PERSONS[i]).reduce((a,r)=>a+r.amount,0);
    const repRcv  = monthRepsP.filter(r=>r.from!==PERSONS[i]&&r.from!=="Wspólne").reduce((a,r)=>a+r.amount,0);
    const balance = myInc - totalExp - repPaid + repRcv;
    const balCol = balance>=0?C.inc:C.exp;

    // category breakdown
    const catMap={};
    myTxs.filter(t=>t.type==="expense").forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
    if(sharedHalf>0) catMap["🤝 Wspólne (½)"]=(catMap["🤝 Wspólne (½)"]||0)+sharedHalf;
    const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const maxCat=cats[0]?.[1]||1;

    const toggleFn = i===0?"toggleBudget0":"toggleBudget1";

    return `<div class="card" style="padding:0;overflow:hidden;border-color:${col}44">
      <button onclick="${toggleFn}()" style="width:100%;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:${col}11;border:none;text-align:left">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${col}"></div>
          <div>
            <div style="font-weight:700;font-size:14px;color:${s.txt}">${name}</div>
            <div style="font-size:11px;color:${C.mut};margin-top:1px">Mój budżet</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div style="font-size:11px;color:${C.mut}">Bilans</div>
            <div style="font-weight:800;font-size:15px;color:${balCol}">${fmt(balance)}</div>
          </div>
          <div style="color:${C.mut};font-size:16px;transition:transform .2s;transform:rotate(${expanded?180:0}deg)">▾</div>
        </div>
      </button>

      ${expanded?`<div style="padding:14px 16px;border-top:1px solid ${col}22">
        <!-- Summary row -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
          <div style="background:${C.bg};border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:10px;color:${C.mut};margin-bottom:2px">↑ Przychody</div>
            <div style="font-weight:700;font-size:13px;color:${C.inc}">${fmt(myInc)}</div>
          </div>
          <div style="background:${C.bg};border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:10px;color:${C.mut};margin-bottom:2px">↓ Wydatki</div>
            <div style="font-weight:700;font-size:13px;color:${C.exp}">${fmt(totalExp)}</div>
          </div>
          <div style="background:${C.bg};border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:10px;color:${C.mut};margin-bottom:2px">= Bilans</div>
            <div style="font-weight:700;font-size:13px;color:${balCol}">${fmt(balance)}</div>
          </div>
        </div>
        <!-- Shared note -->
        ${sharedHalf>0?`<div style="font-size:11px;color:${C.mut};margin-bottom:10px;padding:6px 10px;background:${C.bg};border-radius:8px">
          Zawiera połowę wydatków wspólnych: ${fmt(sharedHalf)}

function renderSettle(st){
  const s = STATE;
  const bars = [{name:s.names[0],own:st.p1o,paid:st.p1paid,col:C.p1},{name:s.names[1],own:st.p2o,paid:st.p2paid,col:C.p2}].map(p=>`

  let verdict = "";

    verdict = `<div style="padding:10px;border-radius:12px;background:#14532d33;border:1px solid #22c55e44;text-align:center;font-size:13px;font-weight:600;color:${C.inc};margin-bottom:12px">✅ Wydatki są równo podzielone</div>`;

      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:${C.inc};margin-bottom:6px">
        <span>Spłacono:</span><span>- ${fmt(st.repaid)}</span>

      <div style="font-size:15px;font-weight:700;color:${C.acc};text-align:center;margin-bottom:4px">${st.debtor} → ${st.creditor}</div>
      ${repLines}
      <div style="font-size:24px;font-weight:800;color:#fff;text-align:center">${fmt(st.after)}</div>
    </div>`;
  }

  // Repayment form — always show so either person can register a payment
  const repForm = st.after > 0.01 ? `
    <div style="border-top:1px solid ${C.bdr};padding-top:12px">
      <div style="font-size:12px;font-weight:600;color:${C.mut};margin-bottom:8px">💸 Zarejestruj spłatę</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        ${[0,1].map(i=>`<button onclick="setState({repFrom:PERSONS[${i}]})" style="flex:1;padding:7px;border-radius:8px;font-size:11px;font-weight:700;border:2px solid ${[C.p1,C.p2][i]};background:${STATE.repFrom===PERSONS[i]?[C.p1,C.p2][i]:'transparent'};color:${STATE.repFrom===PERSONS[i]?'#fff':[C.p1,C.p2][i]}">${s.names[i]} płaci</button>`).join("")}
      </div>
      <div style="display:flex;gap:8px">
        <input class="inp" type="number" min="0" step="0.01" placeholder="Kwota PLN" id="repAmtInp" value="${STATE.repAmt}" oninput="STATE.repAmt=this.value" style="flex:1"/>
        <button onclick="addRepayment()" style="padding:10px 14px;border-radius:10px;font-weight:700;background:${C.inc};color:#fff;font-size:13px;white-space:nowrap">✓ Dodaj</button>
      </div>
    </div>` : "";

  const repHistory = st.monthReps.length>0 ? `
    <div style="border-top:1px solid ${C.bdr};padding-top:12px;margin-top:12px">
      <div style="font-size:12px;font-weight:600;color:${C.mut};margin-bottom:8px">Historia spłat</div>
      ${st.monthReps.sort((a,b)=>b.id-a.id).map(r=>{
        const fi=PERSONS.indexOf(r.from); const fn=fi>=0?s.names[fi]:r.from; const tn=s.names[fi===0?1:0];
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;background:${C.bg};margin-bottom:6px">
          <div style="font-size:12px"><b style="color:${C.inc}">${fn}</b><span style="color:${C.mut}"> → </span><b>${tn}</b><span style="font-size:10px;color:${C.mut};margin-left:6px">${r.date}</span></div>
          <div style="display:flex;align-items:center;gap:8px"><b style="color:${C.inc}">${fmt(r.amount)}</b><button onclick="fbDel('repayments/${r.id}')" style="color:${C.mut};font-size:13px">🗑️</button></div>
        </div>`;
      }).join("")}
    </div>` : "";

  return `<div class="card">
    <div style="font-weight:700;font-size:13px;margin-bottom:12px">⚖️ Rozliczenie wydatków</div>
    ${bars}${sharedNote}${verdict}${repForm}${repHistory}
  </div>`;
}

// ── Personal budget ───────────────────────────────────────────────────────────
function renderPersonal(filtered){
  const s = STATE;

  // Person selector
  const selPerson = s.personalPerson || PERSONS[0];
  const selName   = selPerson===PERSONS[0] ? s.names[0] : s.names[1];
  const selCol    = selPerson===PERSONS[0] ? C.p1 : C.p2;

  // Filter: own transactions + half of shared
  const ownTxs    = filtered.filter(t=>t.person===selPerson);
  const sharedTxs = filtered.filter(t=>t.person==="Wspólne");

  const ownInc  = ownTxs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const ownExp  = ownTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const sharedExp = sharedTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const totalExp  = ownExp + sharedExp/2;
  // Repayments: money paid OUT reduces balance, money received increases it
  const monthReps = s.reps.filter(r=>r.month===s.fM&&r.year===s.fY);
  const paidOut   = monthReps.filter(r=>r.from===selPerson).reduce((a,r)=>a+r.amount,0);
  const received  = monthReps.filter(r=>r.from!==selPerson&&r.from!=="Wspólne").reduce((a,r)=>a+r.amount,0);
  const balance   = ownInc - totalExp - paidOut + received;

  // Categories breakdown (own + half shared)
  const catMap = {};
  ownTxs.filter(t=>t.type==="expense").forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  sharedTxs.filter(t=>t.type==="expense").forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount/2;});
  const cats = Object.entries(catMap).map(([name,v])=>({name,v})).sort((a,b)=>b.v-a.v);

  // Recent transactions (own only)
  const recent = [...ownTxs].sort((a,b)=>(b.day||1)-(a.day||1)||b.id-a.id).slice(0,5);

  return `<div style="display:flex;flex-direction:column;gap:12px">

    <!-- Person selector -->
    <div style="display:flex;gap:10px">
      ${[0,1].map(i=>{
        const p=PERSONS[i]; const col=[C.p1,C.p2][i]; const nm=s.names[i];
        const active=selPerson===p;
        return `<button onclick="STATE.personalPerson='${p}';render()" style="flex:1;padding:11px;border-radius:12px;font-size:14px;font-weight:700;border:2px solid ${col};background:${active?col:'transparent'};color:${active?'#fff':col}">${nm}</button>`;
      }).join("")}
    </div>

    <!-- Summary cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="card" style="padding:12px">
        <div style="font-size:10px;color:${C.mut};margin-bottom:4px">↑ Przychody</div>
        <div style="font-weight:700;font-size:13px;color:${C.inc}">${fmt(ownInc)}</div>
      </div>
      <div class="card" style="padding:12px">
        <div style="font-size:10px;color:${C.mut};margin-bottom:4px">↓ Wydatki</div>
        <div style="font-weight:700;font-size:13px;color:${C.exp}">${fmt(totalExp)}</div>
        ${sharedExp>0?`<div style="font-size:9px;color:${C.mut};margin-top:2px">w tym wspólne: ${fmt(sharedExp/2)}</div>`:""}
      </div>
      <div class="card" style="padding:12px">
        <div style="font-size:10px;color:${C.mut};margin-bottom:4px">= Bilans</div>
        <div style="font-weight:700;font-size:13px;color:${balance>=0?C.inc:C.exp}">${fmt(balance)}</div>
        ${paidOut>0?`<div style="font-size:9px;color:${C.exp};margin-top:2px">oddane: -${fmt(paidOut)}</div>`:""}
        ${received>0?`<div style="font-size:9px;color:${C.inc};margin-top:2px">otrzymane: +${fmt(received)}</div>`:""}
      </div>
    </div>

    <!-- Categories -->
    ${cats.length>0?`<div class="card">
      <div style="font-weight:600;font-size:13px;color:${C.mut};margin-bottom:12px">Wydatki wg kategorii</div>
      ${cats.map((c,i)=>`
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span>${c.name}</span><b style="color:${C.exp}">${fmt(c.v)}</b>
          </div>
          <div style="height:5px;border-radius:4px;background:#334155">
            <div style="height:5px;border-radius:4px;background:${CC[i%15]};width:${(c.v/cats[0].v)*100}%"></div>
          </div>
        </div>`).join("")}
    </div>`:""}

    <!-- Recent transactions -->
    ${recent.length>0?`<div class="card">
      <div style="font-weight:600;font-size:13px;color:${C.mut};margin-bottom:12px">Ostatnie transakcje</div>
      ${recent.map(tx=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid ${C.bdr};last-child:border:none">
          <div style="font-size:20px">${tx.category.split(" ")[0]}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tx.description||tx.category.split(" ").slice(1).join(" ")}</div>
            <div style="font-size:11px;color:${C.mut}">${tx.day} ${MONTHS[tx.month]?.slice(0,3)}</div>
          </div>
          <div style="font-weight:700;font-size:13px;color:${tx.type==="income"?C.inc:C.exp};flex-shrink:0">${tx.type==="income"?"+":"-"}${fmt(tx.amount)}</div>
        </div>`).join("")}
    </div>`:""}

  </div>`;
}

function renderCharts(cd){
  const s = STATE;
  if(s.pieChart){s.pieChart.destroy();s.pieChart=null;}
  if(s.barChart){s.barChart.destroy();s.barChart=null;}

  const pieEl = el("pieChart");
  if(pieEl && cd.length>0){
    s.pieChart = new Chart(pieEl,{type:"doughnut",data:{labels:cd.map(d=>d.name.split(" ").slice(1).join(" ")),datasets:[{data:cd.map(d=>d.v),backgroundColor:CC,borderWidth:2,borderColor:"#1e293b"}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+fmt(c.raw)}}}}});
  }
  const barEl = el("barChart");
  if(barEl){
    const m6 = Array.from({length:6},(_,i)=>{
      const d=new Date(s.fY,s.fM-i,1);
      const arr=s.txs.filter(t=>t.month===d.getMonth()&&t.year===d.getFullYear());
      const t=totals(arr);
      return {name:MONTHS[d.getMonth()].slice(0,3),inc:t.inc,exp:t.exp};
    }).reverse();
    s.barChart = new Chart(barEl,{type:"bar",data:{labels:m6.map(d=>d.name),datasets:[{label:"Przychody",data:m6.map(d=>d.inc),backgroundColor:"#22c55e",borderRadius:5},{label:"Wydatki",data:m6.map(d=>d.exp),backgroundColor:"#ef4444",borderRadius:5}]},options:{responsive:true,plugins:{legend:{labels:{color:"#94a3b8",font:{size:11}}},tooltip:{callbacks:{label:c=>" "+fmt(c.raw)}}},scales:{x:{ticks:{color:"#94a3b8",font:{size:11}},grid:{color:"#334155"}},y:{ticks:{color:"#94a3b8",font:{size:11},callback:v=>fmt(v)},grid:{color:"#334155"}}}}});
  }
}

// ── Calculations ──────────────────────────────────────────────────────────────
function totals(arr){
  return {
    inc: arr.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0),
    exp: arr.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0)
  };
}

function catData(filtered){
  const m={};
  filtered.filter(t=>t.type==="expense").forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;});
  return Object.entries(m).map(([name,v])=>({name,v})).sort((a,b)=>b.v-a.v);
}

function calcSettlement(filtered){
  const s = STATE;
  const inScope = t => !t.excludeFromSettlement && (Array.isArray(s.excl)?!s.excl.includes(t.category):true);
  const p1o=filtered.filter(t=>t.type==="expense"&&t.person===PERSONS[0]&&inScope(t)).reduce((a,t)=>a+t.amount,0);
  const p2o=filtered.filter(t=>t.type==="expense"&&t.person===PERSONS[1]&&inScope(t)).reduce((a,t)=>a+t.amount,0);
  const sh =filtered.filter(t=>t.type==="expense"&&t.person==="Wspólne"&&inScope(t)).reduce((a,t)=>a+t.amount,0);
  const total=p1o+p2o+sh; if(!total) return null;
  const fair=total/2; const p1paid=p1o+sh/2; const p2paid=p2o+sh/2; const p1bal=p1paid-fair;
  const monthReps=s.reps.filter(r=>r.month===s.fM&&r.year===s.fY);
  // Net repayments: p1→p2 is negative for p1bal, p2→p1 is positive
  const netRep=monthReps.reduce((a,r)=>r.from===PERSONS[0]?a-r.amount:a+r.amount,0);
  const netBal=p1bal+netRep;
  const debtor=netBal<0?s.names[0]:s.names[1];
  const debtorP=netBal<0?PERSONS[0]:PERSONS[1];
  const creditor=netBal<0?s.names[1]:s.names[0];
  const raw=Math.abs(p1bal);
  const repaid=monthReps.filter(r=>r.from===(p1bal<0?PERSONS[0]:PERSONS[1])).reduce((a,r)=>a+r.amount,0);
  const overpaid=monthReps.filter(r=>r.from!==(p1bal<0?PERSONS[0]:PERSONS[1])).reduce((a,r)=>a+r.amount,0);
  const after=Math.abs(netBal);
  return {p1o,p2o,sh,total,p1paid,p2paid,raw,after,debtor,creditor,debtorP,repaid,monthReps,maxPaid:Math.max(p1paid,p2paid,1)};
}

}

    </div>

function closeScanner(){ el("scanOverlay")?.remove(); }

let scanFile=null;
function scanPickFile(inp){
  scanFile=inp.files?.[0]; if(!scanFile) return;
  const r=new FileReader();
  r.onload=e=>{
    const prev=el("scanPreview");
    if(prev) prev.innerHTML=`<img src="${e.target.result}" style="max-height:200px;border-radius:8px;object-fit:contain;width:100%"/>`;
    const btn=el("scanBtn");
    if(btn){btn.disabled=false;btn.style.background=C.acc;btn.style.color="#0f172a";}
  };
  r.readAsDataURL(scanFile);
}

async function doScan(){
  if(!scanFile) return;
  const btn=el("scanBtn"); if(btn){btn.disabled=true;btn.innerHTML="<span class='sp'></span> Odczytuję…";}
  const errEl=el("scanErr");
  try{
    const fd=new FormData();
    fd.append("file",scanFile); fd.append("apikey","helloworld"); fd.append("language","pol"); fd.append("OCREngine","2");
    const res=await fetch("https://api.ocr.space/parse/image",{method:"POST",body:fd});
    const d=await res.json();
    if(d.IsErroredOnProcessing) throw new Error(d.ErrorMessage?.[0]||"Błąd OCR");
    const txt=d.ParsedResults?.[0]?.ParsedText||"";
    if(!txt.trim()) throw new Error("Nie udało się odczytać tekstu.");
    const p=parseOCR(txt);
    closeScanner(); scanFile=null;
    STATE.form={...STATE.form,...p,type:"expense",person:PERSONS[0]};
    STATE.scanFlash=true; setState({view:"add"});
    setTimeout(()=>setState({scanFlash:false}),1800);
  }catch(e){
    if(errEl){errEl.textContent="⚠️ Błąd: "+e.message;errEl.classList.remove("hide");}
    if(btn){btn.disabled=false;btn.style.background=C.acc;btn.style.color="#0f172a";btn.innerHTML="🔍 Spróbuj ponownie";}
  }
}

function parseOCR(txt){
  const lines=txt.split(/\n/).map(l=>l.trim()).filter(Boolean);
  let amount=null;
  for(const l of lines){
    const m=l.match(/(?:suma|razem|do\s*zap.aty|total)[^\d]*([\d]+[.,][\d]{2})/i);
    if(m){amount=parseFloat(m[1].replace(",","."));break;}
  }
  if(!amount){const nums=[...txt.matchAll(/([\d]{1,4}[.,][\d]{2})/g)].map(m=>parseFloat(m[1].replace(",",".")));if(nums.length)amount=Math.max(...nums);}
  let day=null,month=null,year=null;
  const dm=txt.match(/(\d{2})[.\-\/](\d{2})[.\-\/](\d{4})/)||txt.match(/(\d{4})[.\-\/](\d{2})[.\-\/](\d{2})/);
  if(dm){if(dm[3]?.length===4){day=+dm[1];month=+dm[2]-1;year=+dm[3];}else{year=+dm[1];month=+dm[2]-1;day=+dm[3];}}
  const desc=lines.find(l=>l.length>3&&!/^[\d\s.,*]+$/.test(l))||"";
  const t=txt.toLowerCase();
  let cat=CATS[1];
  if(/biedronka|lidl|aldi|kaufland|żabka|stokrotka|carrefour|netto|dino|spar/.test(t)) cat=CATS[1];
  else if(/orlen|bp|shell|lotos|circle k|paliwo/.test(t)) cat=CATS[2];
  else if(/apteka|farmacja|leki/.test(t)) cat=CATS[6];
  else if(/kino|teatr|cinema/.test(t)) cat=CATS[4];
  return {amount:amount??"",day:day??now.getDate(),month:month??now.getMonth(),year:year??now.getFullYear(),description:desc,category:cat};
}

// ── Firebase listeners ────────────────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  STATE.authed=!!user; STATE.authChecked=true;
  if(user){
    db.ref("transactions").on("value",s=>setState({txs:s.val()?Object.values(s.val()):[],syncStatus:"connected"}));
    db.ref("repayments").on("value",s=>setState({reps:s.val()?Object.values(s.val()):[]}));
    db.ref("excludedCats").on("value",s=>setState({excl:s.val()||[]}));
    db.ref("recurring").on("value",s=>{
      const rec=s.val()?Object.values(s.val()):[];
      STATE.recurring=rec;
      // Auto-inject active recurring for current month
      rec.filter(r=>r.active).forEach(r=>injectRecurring(r));
      render();
    });
    db.ref("names").on("value",s=>{ if(s.val()&&Array.isArray(s.val())) setState({names:s.val()}); });
  } else {
    render();
  }
});
</script>
