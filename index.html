// ── Helpers ───────────────────────────────────────────────────────────────────
function useFB(path, def=[]) {
  const [val,setVal] = useState(def);
  useEffect(()=>{
    if(!path) return;
    return fb.listen(path, v=> setVal(v ? (Array.isArray(def) ? Object.values(v) : v) : def));
  },[path]);
  return val;
}

function totals(arr){
  return {
    inc: arr.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),
    exp: arr.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0),
  };
}

// ── Charts ────────────────────────────────────────────────────────────────────
function PieChart({data}){
  const canv=useRef(); const ch=useRef();
  useEffect(()=>{
    if(!canv.current||!data.length) return;
    if(ch.current) ch.current.destroy();
    ch.current=new Chart(canv.current,{
      type:"doughnut",
      data:{labels:data.map(d=>d.name.split(" ").slice(1).join(" ")),datasets:[{data:data.map(d=>d.v),backgroundColor:CC,borderWidth:2,borderColor:"#1e293b"}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+fmt(c.raw)}}}}
    });
    return()=>{if(ch.current)ch.current.destroy();};
  },[data]);
  if(!data.length) return null;
  return html`<canvas ref=${canv} style="max-height:200px"/>`;
}

function BarChart({data}){
  const canv=useRef(); const ch=useRef();
  useEffect(()=>{
    if(!canv.current) return;
    if(ch.current) ch.current.destroy();
    ch.current=new Chart(canv.current,{
      type:"bar",
      data:{labels:data.map(d=>d.name),datasets:[
        {label:"Przychody",data:data.map(d=>d.inc),backgroundColor:"#22c55e",borderRadius:5},
        {label:"Wydatki",data:data.map(d=>d.exp),backgroundColor:"#ef4444",borderRadius:5}
      ]},
      options:{responsive:true,
        plugins:{legend:{labels:{color:"#94a3b8",font:{size:11}}},tooltip:{callbacks:{label:c=>" "+fmt(c.raw)}}},
        scales:{x:{ticks:{color:"#94a3b8",font:{size:11}},grid:{color:"#334155"}},
                y:{ticks:{color:"#94a3b8",font:{size:11},callback:v=>fmt(v)},grid:{color:"#334155"}}}}
    });
    return()=>{if(ch.current)ch.current.destroy();};
  },[data]);
  return html`<canvas ref=${canv} style="max-height:220px"/>`;
}

// ── Scanner ───────────────────────────────────────────────────────────────────
function Scanner({onResult,onClose}){
  const [file,setFile]=useState(null); const [prev,setPrev]=useState(null);
  const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const camRef=useRef(); const galRef=useRef();

  function pickFile(f){
    if(!f) return;
    setFile(f); setErr("");
    const r=new FileReader(); r.onload=e=>setPrev(e.target.result); r.readAsDataURL(f);
  }

  function parseText(txt){
    const lines=txt.split(/\n/).map(l=>l.trim()).filter(Boolean);
    let amount=null;
    for(const l of lines){
      const m=l.match(/(?:suma|razem|do\s*zap.aty|total)[^\d]*([\d]+[.,][\d]{2})/i);
      if(m){amount=parseFloat(m[1].replace(",","."));break;}
    }
    if(!amount){
      const nums=[...txt.matchAll(/([\d]{1,4}[.,][\d]{2})/g)].map(m=>parseFloat(m[1].replace(",",".")));
      if(nums.length) amount=Math.max(...nums);
    }
    let day=null,month=null,year=null;
    const dm=txt.match(/(\d{2})[.\-\/](\d{2})[.\-\/](\d{4})/)||txt.match(/(\d{4})[.\-\/](\d{2})[.\-\/](\d{2})/);
    if(dm){ if(dm[3]?.length===4){day=+dm[1];month=+dm[2]-1;year=+dm[3];}else{year=+dm[1];month=+dm[2]-1;day=+dm[3];} }
    const desc=lines.find(l=>l.length>3&&!/^[\d\s.,*]+$/.test(l))||"";
    const t=txt.toLowerCase();
    let cat=CATS[1];
    if(/biedronka|lidl|aldi|kaufland|żabka|stokrotka|carrefour|netto|dino|spar/.test(t)) cat=CATS[1];
    else if(/orlen|bp|shell|lotos|circle k|paliwo/.test(t)) cat=CATS[2];
    else if(/apteka|farmacja|leki/.test(t)) cat=CATS[6];
    else if(/kino|teatr|cinema/.test(t)) cat=CATS[4];
    return {amount,day,month,year,description:desc,category:cat};
  }

  async function scan(){
    if(!file) return; setBusy(true); setErr("");
    try{
      const fd=new FormData();
      fd.append("file",file); fd.append("apikey","helloworld");
      fd.append("language","pol"); fd.append("OCREngine","2");
      const res=await fetch("https://api.ocr.space/parse/image",{method:"POST",body:fd});
      const d=await res.json();
      if(d.IsErroredOnProcessing) throw new Error(d.ErrorMessage?.[0]||"Błąd OCR");
      const txt=d.ParsedResults?.[0]?.ParsedText||"";
      if(!txt.trim()) throw new Error("Nie udało się odczytać tekstu.");
      const p=parseText(txt);
      onResult({...p,amount:p.amount??"",day:p.day??now.getDate(),month:p.month??now.getMonth(),year:p.year??now.getFullYear(),type:"expense",person:PERSONS[0]});
    }catch(e){setErr("Błąd: "+e.message);}
    finally{setBusy(false);}
  }

  return html`
    <div onClick=${e=>e.target===e.currentTarget&&onClose()} style=${{position:"fixed",inset:0,background:"#000000cc",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div class="card fa" style=${{width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:14}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <b style=${{fontSize:16}}>🧾 Skan paragonu</b>
          <button onClick=${onClose} style=${{color:C.mut,fontSize:22}}>✕</button>
        </div>
        <div style=${{padding:"8px 12px",borderRadius:10,background:"#1e3a5f",border:`1px solid ${C.acc}33`,fontSize:11,color:C.acc}}>
          ℹ️ OCR odczyta tekst i automatycznie wyciągnie kwotę, datę i sklep. Działa za darmo.
        </div>
        ${prev
          ? html`<img src=${prev} style=${{borderRadius:10,objectFit:"contain",maxHeight:200,width:"100%",background:C.bg}}/>`
          : html`<div style=${{minHeight:120,border:`2px dashed ${C.bdr}`,borderRadius:12,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,color:C.mut,fontSize:13}}>
              <span style=${{fontSize:36}}>📷</span><span>Wybierz zdjęcie poniżej</span>
            </div>`}
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick=${()=>camRef.current?.click()} style=${{padding:"10px",borderRadius:10,border:`1px solid ${C.bdr}`,color:C.acc,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            📷 Aparat
          </button>
          <button onClick=${()=>galRef.current?.click()} style=${{padding:"10px",borderRadius:10,border:`1px solid ${C.bdr}`,color:C.acc,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            🖼️ Galeria
          </button>
        </div>
        <input ref=${camRef} type="file" accept="image/*" capture="environment" style=${{display:"none"}} onChange=${e=>pickFile(e.target.files?.[0])}/>
        <input ref=${galRef} type="file" accept="image/*" style=${{display:"none"}} onChange=${e=>pickFile(e.target.files?.[0])}/>
        ${err&&html`<div style=${{padding:"9px 12px",borderRadius:10,background:"#2d1515",color:"#fca5a5",fontSize:12}}>⚠️ ${err}</div>`}
        <div style=${{display:"flex",gap:10}}>
          <button onClick=${onClose} style=${{flex:1,padding:"11px",borderRadius:10,border:`1px solid ${C.bdr}`,color:C.mut,fontWeight:600}}>Anuluj</button>
          <button onClick=${scan} disabled=${!file||busy}
            style=${{flex:2,padding:"11px",borderRadius:10,fontWeight:700,background:file&&!busy?C.acc:"#334155",color:file&&!busy?"#0f172a":C.mut,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            ${busy?html`<span class="spin" style=${{borderTopColor:C.mut}}></span>`:""}
            ${busy?"Odczytuję…":"🔍 Skanuj paragon"}
          </button>
        </div>
      </div>
    </div>`;
}

function App(){

  useEffect(()=>{ if(fbNames&&Array.isArray(fbNames)){ setNames(fbNames); setTmpNames(fbNames); } },[fbNames]);

  const filtered = txs.filter(t=>t.month===fM&&t.year===fY);

  async function fbSet(path,val){ setSync("syncing"); try{await fb.set(path,val);setSync("connected");}catch{setSync("offline");} }
  async function fbDel(path){ setSync("syncing"); try{await fb.del(path);setSync("connected");}catch{setSync("offline");} }

  async function addOrUpdate(){
    if(!form.amount||isNaN(+form.amount)) return;
    const tx={...form,amount:+form.amount,id:editId||Date.now()};

    if(!repAmt||+repAmt<=0) return;
    const r={id:Date.now(),amount:+repAmt,from:repFrom,date:now.toISOString().slice(0,10),month:fM,year:fY};
    await fbSet(`repayments/${r.id}`,r);

  }

  function handleScan(r){ setForm(f=>({...f,...r}));setScanner(false);setView("add");setFlash(true);setTimeout(()=>setFlash(false),1800); }

  // Settlement calc
  function calcSettlement(){
    const inScope=t=>!t.excludeFromSettlement&&(Array.isArray(excl)?!excl.includes(t.category):true);
    const p1o=filtered.filter(t=>t.type==="expense"&&t.person===PERSONS[0]&&inScope(t)).reduce((s,t)=>s+t.amount,0);
    const p2o=filtered.filter(t=>t.type==="expense"&&t.person===PERSONS[1]&&inScope(t)).reduce((s,t)=>s+t.amount,0);
    const sh=filtered.filter(t=>t.type==="expense"&&t.person==="Wspólne"&&inScope(t)).reduce((s,t)=>s+t.amount,0);
    const total=p1o+p2o+sh;
    if(!total) return null;
    const fair=total/2;
    const p1paid=p1o+sh/2; const p2paid=p2o+sh/2;
    const p1bal=p1paid-fair;
    const debtor=p1bal<0?names[0]:names[1];
    const debtorP=p1bal<0?PERSONS[0]:PERSONS[1];
    const creditor=p1bal<0?names[1]:names[0];
    const raw=Math.abs(p1bal);
    const monthReps=reps.filter(r=>r.month===fM&&r.year===fY);
    const repaid=monthReps.filter(r=>r.from===debtorP).reduce((s,r)=>s+r.amount,0);
    const after=Math.max(0,raw-repaid);
    return {p1o,p2o,sh,total,p1paid,p2paid,raw,after,debtor,creditor,debtorP,repaid,monthReps,maxPaid:Math.max(p1paid,p2paid,1)};
  }

  // Auto-inject active recurring items as transactions for current month
  useEffect(()=>{

        const tx={

          description:r.name,

          year:fY,
          excludeFromSettlement:!!r.excludeFromSettlement,
        };
        await fbSet(`transactions/${tx.id}`,tx);

    });

  }

  async function toggleRecurring(r){
    await fbSet(`recurring/${r.id}`,{...r,active:!r.active});
    // Remove injected tx for current month if deactivating
    if(r.active){
      const key=`rec_${r.id}_${fY}_${fM}`;
      const tx=txs.find(t=>t.recurringKey===key);
      if(tx) await fbDel(`transactions/${tx.id}`);
    }
  }

  async function deleteRecurring(r){
    await fbDel(`recurring/${r.id}`);
    // Remove all injected txs for this recurring item
    txs.filter(t=>t.recurringId===r.id).forEach(t=>fbDel(`transactions/${t.id}`));
  }

    return Object.entries(m).map(([name,v])=>({name,v})).sort((a,b)=>b.v-a.v);
  }

  function monthly6(){
    return Array.from({length:6},(_,i)=>{
      const d=new Date(fY,fM-i,1);
      const arr=txs.filter(t=>t.month===d.getMonth()&&t.year===d.getFullYear());

  const syncColor={connected:"#22c55e",syncing:"#f59e0b",offline:"#ef4444",connecting:"#94a3b8"}[sync]||"#94a3b8";
  const syncLabel={connected:"Zsynchronizowano",syncing:"Synchronizacja…",offline:"Offline",connecting:"Łączenie…"}[sync]||"";

  const navItems=[["dashboard","📊"],["transactions","📋"],["stats","📈"],["add","➕"],["recurring","🔄"],["settings","⚙️"]];
  const navLabels={dashboard:"Przegląd",transactions:"Transakcje",stats:"Wykresy",add:"Dodaj",recurring:"Cykliczne",settings:"Ustawienia"};

  const tag=(col,txt)=>html`<span style=${{fontSize:11,fontWeight:600,color:col,padding:"2px 7px",borderRadius:6,background:col+"22"}}>${txt}</span>`;

  if(!authDone) return html`
    <div style=${{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:14,color:C.mut}}>
      <span style=${{width:32,height:32,border:`3px solid ${C.bdr}`,borderTopColor:C.acc,borderRadius:"50%",display:"inline-block",animation:"spin .8s linear infinite"}}></span>
      <span style=${{fontSize:14}}>Ładowanie…</span>
    </div>`;

  if(!authed) return html`<${Login}/>`;

  return html`
    <div style=${{background:C.bg,minHeight:"100vh",paddingBottom:24}}>
      ${scanner&&html`<${Scanner} onResult=${handleScan} onClose=${()=>setScanner(false)}/>`}

      <!-- Header -->
      <div style=${{background:C.card,borderBottom:`1px solid ${C.bdr}`,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style=${{fontWeight:800,fontSize:16,color:C.acc}}>💰 Budżet Domowy</div>
          <div style=${{display:"flex",alignItems:"center",gap:5,fontSize:11,color:syncColor,marginTop:2}}>
            <span style=${{width:6,height:6,borderRadius:"50%",background:syncColor,display:"inline-block",animation:sync==="syncing"?"pulse 1.2s infinite":undefined}}></span>
            ${syncLabel}
          </div>
        </div>
        ${editNames
          ? html`<div style=${{display:"flex",gap:6,alignItems:"center"}}>
              <input class="inp" value=${tmpNames[0]} onInput=${e=>setTmpNames([e.target.value,tmpNames[1]])} style=${{width:74,fontSize:12,padding:"6px 8px"}}/>
              <input class="inp" value=${tmpNames[1]} onInput=${e=>setTmpNames([tmpNames[0],e.target.value])} style=${{width:74,fontSize:12,padding:"6px 8px"}}/>
              <button onClick=${()=>{fbSet("names",tmpNames);setNames(tmpNames);setEditNames(false);}} style=${{background:C.acc,color:"#0f172a",borderRadius:6,padding:"6px 10px",fontWeight:700,fontSize:12}}>✓</button>
              <button onClick=${()=>setEditNames(false)} style=${{background:"#334155",color:C.mut,borderRadius:6,padding:"6px 8px"}}>✕</button>
            </div>`
          : html`<div style=${{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick=${()=>{setTmpNames(names);setEditNames(true);}} style=${{color:C.mut,fontSize:12}}>✏️ Imiona</button>
              <button onClick=${()=>fb.signOut()} style=${{color:"#ef444488",fontSize:13}} title="Wyloguj">🔒</button>
            </div>`}
      </div>

      <!-- Month nav -->
      <div style=${{background:C.card,borderBottom:`1px solid ${C.bdr}`,padding:"8px 16px",display:"flex",alignItems:"center"}}>
        <button onClick=${()=>{const d=new Date(fY,fM-1);setFM(d.getMonth());setFY(d.getFullYear());}} style=${{color:C.mut,fontSize:22,padding:"0 8px"}}>‹</button>
        <span style=${{flex:1,textAlign:"center",fontWeight:700,fontSize:14}}>${MONTHS[fM]} ${fY}</span>
        <button onClick=${()=>{const d=new Date(fY,fM+1);setFM(d.getMonth());setFY(d.getFullYear());}} style=${{color:C.mut,fontSize:22,padding:"0 8px"}}>›</button>
      </div>

      <!-- Nav tabs -->
      <div style=${{display:"flex",borderBottom:`1px solid ${C.bdr}`,background:C.card}}>
        ${navItems.map(([v,ico])=>html`
          <button key=${v} onClick=${()=>navTo(v)}
            style=${{flex:1,padding:"8px 0 6px",fontSize:11,fontWeight:600,color:view===v?C.acc:C.mut,
              borderBottom:view===v?`2px solid ${C.acc}`:"2px solid transparent",background:"transparent",transition:"color .15s"}}>
            <div style=${{fontSize:17}}>${ico}</div>
            <div>${navLabels[v]}</div>
          </button>`)}
      </div>

      <div style=${{padding:14,maxWidth:520,margin:"0 auto"}}>

        <!-- DASHBOARD -->
        ${view==="dashboard"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:12}}>
          <!-- Summary -->
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            ${[["↑ Przychody",tot.inc,C.inc],["↓ Wydatki",tot.exp,C.exp],["= Bilans",adjustedBalance,adjustedBalance>=0?C.inc:C.exp]].map(([l,v,col])=>html`
              <div key=${l} class="card" style=${{padding:12}}>
                <div style=${{fontSize:10,color:C.mut,marginBottom:4}}>${l}</div>
                <div style=${{fontWeight:700,fontSize:13,color:col}}>${fmt(v)}</div>
              </div>`)}
          </div>

          <!-- Per person -->
          <div class="card">
            <div style=${{fontWeight:600,fontSize:13,color:C.mut,marginBottom:12}}>Podział per osoba</div>
            ${(()=>{
              const monthRepsP=reps.filter(r=>r.month===fM&&r.year===fY);
              // repayments paid by each person (increases their expenses)
              const p1rep=monthRepsP.filter(r=>r.from===PERSONS[0]).reduce((s,r)=>s+r.amount,0);
              const p2rep=monthRepsP.filter(r=>r.from===PERSONS[1]).reduce((s,r)=>s+r.amount,0);
              return [0,1,2].map(i=>{
                const col=[C.p1,C.p2,C.sh][i];
                const label=i<2?names[i]:"Wspólne";
                const pt=totals(filtered.filter(t=>t.person===PERSONS[i]));
                // add repayments paid by this person, subtract repayments received
                const repPaid=i===0?p1rep:i===1?p2rep:0;
                const repReceived=i===0?p2rep:i===1?p1rep:0;
                const adjExp=pt.exp+repPaid-repReceived;
                const hasRep=(repPaid>0||repReceived>0)&&i<2;
                return html`<div key=${i} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:i<2?10:0}}>
                  <div style=${{display:"flex",alignItems:"center",gap:8}}>
                    <div style=${{width:8,height:8,borderRadius:"50%",background:col}}></div>
                    <span style=${{fontSize:14}}>${label}</span>
                  </div>
                  <div style=${{textAlign:"right"}}>
                    <div style=${{fontSize:11,color:C.inc}}>+${fmt(pt.inc)}</div>
                    <div style=${{fontSize:11,color:C.exp,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
                      -${fmt(adjExp)}
                      ${hasRep&&html`<span style=${{fontSize:10,color:C.mut,fontStyle:"italic"}}>(${repPaid>0?"+":""}${fmt(repPaid-repReceived)} spłata)</span>`}
                    </div>
                  </div>
                </div>`;
              });
            })()}
          </div>

          <!-- Settlement -->
          ${settle&&html`<div class="card">
            <div style=${{fontWeight:700,fontSize:13,marginBottom:12}}>⚖️ Rozliczenie wydatków</div>
            <!-- bars -->
            <div style=${{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              ${[{name:names[0],own:settle.p1o,paid:settle.p1paid,col:C.p1},{name:names[1],own:settle.p2o,paid:settle.p2paid,col:C.p2}].map(p=>html`
                <div key=${p.name}>
                  <div style=${{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                    <div style=${{display:"flex",alignItems:"center",gap:6}}>
                      <div style=${{width:8,height:8,borderRadius:"50%",background:p.col}}></div>
                      <b>${p.name}</b>
                    </div>
                    <div style=${{color:C.mut}}>własne: <span style=${{color:C.exp}}>${fmt(p.own)}</span> · łącznie: <b style=${{color:C.txt}}>${fmt(p.paid)}</b></div>
                  </div>
                  <div style=${{height:6,borderRadius:4,background:"#334155"}}>
                    <div style=${{height:6,borderRadius:4,background:p.col,width:`${(p.paid/settle.maxPaid)*100}%`,transition:"width .4s"}}></div>
                  </div>
                </div>`)}
            </div>
            ${settle.sh>0&&html`<div style=${{fontSize:11,color:C.mut,marginBottom:10,padding:"6px 10px",background:"#334155",borderRadius:8}}>
              Wydatki wspólne ${fmt(settle.sh)} podzielone po ${fmt(settle.sh/2)} na osobę
            </div>`}
            <!-- verdict -->
            ${settle.raw>0.01
              ? html`<div style=${{padding:"12px 14px",borderRadius:12,background:"linear-gradient(135deg,#1e3a5f,#1e293b)",border:`1px solid ${C.acc}44`,marginBottom:12}}>
                  <div style=${{fontSize:11,color:C.mut,textAlign:"center",marginBottom:4}}>Do wyrównania</div>
                  <div style=${{fontSize:15,fontWeight:700,color:C.acc,textAlign:"center",marginBottom:4}}>${settle.debtor} → ${settle.creditor}</div>
                  ${settle.repaid>0&&html`<div style=${{display:"flex",justifyContent:"space-between",fontSize:11,color:C.mut,padding:"4px 0",borderTop:`1px solid ${C.bdr}`,marginBottom:4}}>
                    <span>Pierwotny dług:</span><span style=${{textDecoration:"line-through"}}>${fmt(settle.raw)}</span>
                  </div>`}
                  ${settle.repaid>0&&html`<div style=${{display:"flex",justifyContent:"space-between",fontSize:11,color:C.inc,marginBottom:6}}>
                    <span>Spłacono:</span><span>- ${fmt(settle.repaid)}</span>
                  </div>`}
                  <div style=${{fontSize:settle.after<0.01?18:24,fontWeight:800,color:settle.after<0.01?C.inc:"#fff",textAlign:"center"}}>
                    ${settle.after<0.01?"✅ Dług spłacony!":fmt(settle.after)}
                  </div>
                </div>`
              : html`<div style=${{padding:"10px",borderRadius:12,background:"#14532d33",border:"1px solid #22c55e44",textAlign:"center",fontSize:13,fontWeight:600,color:C.inc,marginBottom:12}}>
                  ✅ Wydatki są równo podzielone
                </div>`}
            <!-- add repayment -->
            ${settle.raw>0.01&&settle.after>0.01&&html`<div style=${{borderTop:`1px solid ${C.bdr}`,paddingTop:12}}>
              <div style=${{fontSize:12,fontWeight:600,color:C.mut,marginBottom:8}}>💸 Zarejestruj spłatę</div>
              <div style=${{display:"flex",gap:8,marginBottom:8}}>
                ${[0,1].map(i=>html`<button key=${i} onClick=${()=>setRepFrom(PERSONS[i])}
                  style=${{flex:1,padding:"7px",borderRadius:8,fontSize:11,fontWeight:700,border:`2px solid ${[C.p1,C.p2][i]}`,background:repFrom===PERSONS[i]?[C.p1,C.p2][i]:"transparent",color:repFrom===PERSONS[i]?"#fff":[C.p1,C.p2][i]}}>
                  ${names[i]} płaci
                </button>`)}
              </div>
              <div style=${{display:"flex",gap:8}}>
                <input class="inp" type="number" min="0" step="0.01" placeholder="Kwota PLN" value=${repAmt} onInput=${e=>setRepAmt(e.target.value)} style=${{flex:1}}/>
                <button onClick=${addRepayment} style=${{padding:"10px 14px",borderRadius:10,fontWeight:700,background:C.inc,color:"#fff",fontSize:13,whiteSpace:"nowrap"}}>✓ Dodaj</button>
              </div>
            </div>`}
            <!-- repayment history -->
            ${settle.monthReps.length>0&&html`<div style=${{borderTop:`1px solid ${C.bdr}`,paddingTop:12,marginTop:12}}>
              <div style=${{fontSize:12,fontWeight:600,color:C.mut,marginBottom:8}}>Historia spłat</div>
              ${settle.monthReps.sort((a,b)=>b.id-a.id).map(r=>{
                const fi=PERSONS.indexOf(r.from); const fn=fi>=0?names[fi]:r.from; const tn=names[fi===0?1:0];
                return html`<div key=${r.id} style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:8,background:C.bg,marginBottom:6}}>
                  <div style=${{fontSize:12}}>
                    <b style=${{color:C.inc}}>${fn}</b><span style=${{color:C.mut}}> → </span><b>${tn}</b>
                    <span style=${{fontSize:10,color:C.mut,marginLeft:6}}>${r.date}</span>
                  </div>
                  <div style=${{display:"flex",alignItems:"center",gap:8}}>
                    <b style=${{color:C.inc}}>${fmt(r.amount)}</b>
                    <button onClick=${()=>fbDel(`repayments/${r.id}`)} style=${{color:C.mut,fontSize:13}}>🗑️</button>
                  </div>
                </div>`;
              })}
            </div>`}
          </div>`}

          <!-- Top cats -->
          ${cd.length>0&&html`<div class="card">
            <div style=${{fontWeight:600,fontSize:13,color:C.mut,marginBottom:12}}>Top kategorie wydatków</div>
            ${cd.slice(0,5).map((c,i)=>html`
              <div key=${c.name} style=${{marginBottom:10}}>
                <div style=${{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                  <span>${c.name}</span><b style=${{color:C.exp}}>${fmt(c.v)}</b>
                </div>
                <div style=${{height:5,borderRadius:4,background:"#334155"}}>
                  <div style=${{height:5,borderRadius:4,background:CC[i],width:`${(c.v/cd[0].v)*100}%`,transition:"width .4s"}}></div>
                </div>
              </div>`)}
          </div>`}
        </div>`}

        <!-- TRANSACTIONS -->
        ${view==="transactions"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:10}}>
          ${filtered.length===0&&html`<div style=${{textAlign:"center",padding:"60px 0",color:C.mut}}>
            <div style=${{fontSize:44,marginBottom:8}}>📂</div>
            <div style=${{marginBottom:8}}>Brak transakcji w tym miesiącu</div>
            <button onClick=${()=>navTo("add")} style=${{color:C.acc,fontSize:13,textDecoration:"underline"}}>Dodaj pierwszą</button>
          </div>`}
          ${[...filtered].sort((a,b)=>(b.day||1)-(a.day||1)||b.id-a.id).map(tx=>{
            const pi=PERSONS.indexOf(tx.person); const pc=[C.p1,C.p2,C.sh][pi]||C.mut; const pn=pi<2?names[pi]:"Wspólne";
            const isExcluded=!!tx.excludeFromSettlement;
            return html`<div key=${tx.id} class="card" style=${{padding:12,border:`1px solid ${isExcluded?"#8b5cf644":C.bdr}`}}>
              <div style=${{display:"flex",alignItems:"center",gap:12}}>
                <div style=${{fontSize:24}}>${tx.category.split(" ")[0]}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${tx.description||tx.category.split(" ").slice(1).join(" ")}</div>
                  <div style=${{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                    ${tx.day&&tag(C.acc,`${tx.day} ${MONTHS[tx.month]?.slice(0,3)}`)}
                    ${tag(pc,pn)}
                    ${isExcluded&&tag("#8b5cf6","poza rozliczeniem")}
                  </div>
                </div>
                <div style=${{textAlign:"right",flexShrink:0}}>
                  <div style=${{fontWeight:700,fontSize:13,color:tx.type==="income"?C.inc:C.exp}}>${tx.type==="income"?"+":"-"}${fmt(tx.amount)}</div>
                  <div style=${{display:"flex",gap:6,justifyContent:"flex-end",marginTop:4}}>
                    <button onClick=${()=>startEdit(tx)} style=${{fontSize:15,opacity:.6}}>✏️</button>
                    <button onClick=${()=>fbDel(`transactions/${tx.id}`)} style=${{fontSize:15,opacity:.6}}>🗑️</button>
                  </div>
                </div>
              </div>
              <!-- exclude toggle -->
              ${tx.type==="expense"&&html`<button
                onClick=${()=>fbSet(`transactions/${tx.id}`,{...tx,excludeFromSettlement:!isExcluded})}
                style=${{marginTop:10,width:"100%",padding:"6px",borderRadius:8,fontSize:11,fontWeight:600,
                  border:`1px solid ${isExcluded?"#8b5cf688":C.bdr}`,
                  background:isExcluded?"#8b5cf611":"transparent",
                  color:isExcluded?"#8b5cf6":C.mut,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                ${isExcluded?"✅ Poza rozliczeniem — kliknij aby włączyć":"⚖️ Wyklucz z rozliczenia między osobami"}
              </button>`}
            </div>`;
          })}
        </div>`}

        <!-- STATS -->
        ${view==="stats"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:12}}>
          ${cd.length>0&&html`<div class="card">
            <div style=${{fontWeight:600,fontSize:13,color:C.mut,marginBottom:12}}>Wydatki wg kategorii</div>
            <${PieChart} data=${cd}/>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginTop:12}}>
              ${cd.map((c,i)=>html`<div key=${c.name} style=${{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                <div style=${{width:8,height:8,borderRadius:2,background:CC[i%15],flexShrink:0}}></div>
                <span style=${{color:C.mut,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${c.name.split(" ").slice(1).join(" ")}</span>
                <b style=${{marginLeft:"auto",flexShrink:0}}>${fmt(c.v)}</b>
              </div>`)}
            </div>
          </div>`}
          <div class="card">
            <div style=${{fontWeight:600,fontSize:13,color:C.mut,marginBottom:12}}>Ostatnie 6 miesięcy</div>
            <${BarChart} data=${monthly6()}/>
          </div>
        </div>`}

        <!-- ADD / EDIT -->
        ${view==="add"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:12}}>
          ${!editId&&html`<button onClick=${()=>setScanner(true)}
            style=${{width:"100%",padding:14,borderRadius:12,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10,
              border:`2px solid ${flash?"#22c55e":C.acc}`,background:flash?"#22c55e22":"transparent",color:flash?"#22c55e":C.acc,boxShadow:`0 0 12px ${C.acc}33`}}>
            <span style=${{fontSize:22}}>🧾</span>${flash?"✅ Dane odczytane!":"Skanuj paragon"}
          </button>`}
          <div class="card" style=${{display:"flex",flexDirection:"column",gap:14}}>
            <b style=${{fontSize:15}}>${editId?"Edytuj transakcję":"Lub wpisz ręcznie"}</b>
            <!-- type -->
            <div style=${{display:"flex",borderRadius:10,overflow:"hidden",border:`1px solid ${C.bdr}`}}>
              ${[["expense","💸 Wydatek"],["income","💵 Przychód"]].map(([v,l])=>html`
                <button key=${v} onClick=${()=>setForm(f=>({...f,type:v}))}
                  style=${{flex:1,padding:"10px",fontWeight:700,fontSize:14,background:form.type===v?(v==="income"?C.inc:C.exp):"transparent",color:form.type===v?"#fff":C.mut}}>
                  ${l}
                </button>`)}
            </div>
            <!-- amount -->
            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Kwota (PLN)</label>
              <input class="inp" type="number" min="0" step="0.01" placeholder="0,00" value=${form.amount} onInput=${e=>setForm(f=>({...f,amount:e.target.value}))}/>
            </div>
            <!-- person -->
            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:6}}>Kto?</label>
              <div style=${{display:"flex",gap:8}}>
                ${PERSONS.map((p,i)=>{const col=[C.p1,C.p2,C.sh][i];const lbl=i<2?names[i]:"Wspólne";
                  return html`<button key=${p} onClick=${()=>setForm(f=>({...f,person:p}))}
                    style=${{flex:1,padding:"9px 4px",borderRadius:10,fontSize:12,fontWeight:700,border:`2px solid ${col}`,background:form.person===p?col:"transparent",color:form.person===p?"#fff":col}}>
                    ${lbl}
                  </button>`;
                })}
              </div>
            </div>
            <!-- category -->
            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Kategoria</label>
              <select class="inp" value=${form.category} onChange=${e=>setForm(f=>({...f,category:e.target.value}))}>
                ${CATS.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
              </select>
            </div>
            <!-- description -->
            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Opis (opcjonalnie)</label>
              <input class="inp" type="text" placeholder="np. Biedronka, prąd…" value=${form.description} onInput=${e=>setForm(f=>({...f,description:e.target.value}))}/>
            </div>
            <!-- date -->
            <div style=${{display:"grid",gridTemplateColumns:"1fr 2fr 1fr",gap:8}}>
              <div>
                <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Dzień</label>
                <input class="inp" type="number" min="1" max="31" value=${form.day||""} onInput=${e=>setForm(f=>({...f,day:+e.target.value||1}))}/>
              </div>
              <div>
                <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Miesiąc</label>
                <select class="inp" value=${form.month} onChange=${e=>setForm(f=>({...f,month:+e.target.value}))}>
                  ${MONTHS.map((m,i)=>html`<option key=${i} value=${i}>${m}</option>`)}
                </select>
              </div>
              <div>
                <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Rok</label>
                <select class="inp" value=${form.year} onChange=${e=>setForm(f=>({...f,year:+e.target.value}))}>
                  ${[2024,2025,2026,2027].map(y=>html`<option key=${y} value=${y}>${y}</option>`)}
                </select>
              </div>
            </div>
            <!-- submit -->
            <div style=${{display:"flex",gap:10}}>
              <button onClick=${addOrUpdate}
                style=${{flex:1,padding:"12px",borderRadius:10,fontWeight:700,background:C.acc,color:"#0f172a",fontSize:14}}>
                ${editId?"💾 Zapisz zmiany":"✅ Dodaj transakcję"}
              </button>
              ${editId&&html`<button onClick=${()=>{setEditId(null);setForm(DEF());}}
                style=${{padding:"12px 16px",borderRadius:10,border:`1px solid ${C.bdr}`,color:C.mut,fontWeight:600}}>Anuluj</button>`}
            </div>
          </div>
        </div>`}

        <!-- RECURRING -->
        ${view==="recurring"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:12}}>

          <!-- Summary -->
          ${recurring.filter(r=>r.active).length>0&&html`<div class="card" style=${{background:"linear-gradient(135deg,#1e293b,#0f2133)",border:`1px solid ${C.acc}33`}}>
            <div style=${{fontSize:12,color:C.mut,marginBottom:4}}>Łączny koszt miesięczny</div>
            <div style=${{fontSize:26,fontWeight:800,color:C.acc}}>${fmt(recurring.filter(r=>r.active).reduce((s,r)=>s+ +r.amount,0))}</div>
            <div style=${{fontSize:11,color:C.mut,marginTop:2}}>${recurring.filter(r=>r.active).length} aktywnych subskrypcji</div>
          </div>`}

          <!-- Add / Edit form -->
          <div class="card" style=${{display:"flex",flexDirection:"column",gap:12}}>
            <div style=${{fontWeight:700,fontSize:14}}>${recEdit?"✏️ Edytuj subskrypcję":"➕ Dodaj subskrypcję"}</div>

            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Nazwa (np. Netflix, Spotify)</label>
              <input class="inp" type="text" placeholder="Nazwa subskrypcji" value=${recForm.name}
                onInput=${e=>setRecForm(f=>({...f,name:e.target.value}))}/>
            </div>

            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Kwota (PLN)</label>
                <input class="inp" type="number" min="0" step="0.01" placeholder="0,00" value=${recForm.amount}
                  onInput=${e=>setRecForm(f=>({...f,amount:e.target.value}))}/>
              </div>
              <div>
                <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Dzień miesiąca</label>
                <input class="inp" type="number" min="1" max="28" placeholder="1-28" value=${recForm.day}
                  onInput=${e=>setRecForm(f=>({...f,day:+e.target.value||1}))}/>
              </div>
            </div>

            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:4}}>Kategoria</label>
              <select class="inp" value=${recForm.category} onChange=${e=>setRecForm(f=>({...f,category:e.target.value}))}>
                ${CATS.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
              </select>
            </div>

            <div>
              <label style=${{fontSize:11,color:C.mut,fontWeight:600,display:"block",marginBottom:6}}>Kto płaci?</label>
              <div style=${{display:"flex",gap:8}}>
                ${PERSONS.map((p,i)=>{const col=[C.p1,C.p2,C.sh][i];const lbl=i<2?names[i]:"Wspólne";
                  return html`<button key=${p} onClick=${()=>setRecForm(f=>({...f,person:p}))}
                    style=${{flex:1,padding:"8px 4px",borderRadius:10,fontSize:12,fontWeight:700,border:`2px solid ${col}`,background:recForm.person===p?col:"transparent",color:recForm.person===p?"#fff":col}}>
                    ${lbl}
                  </button>`;
                })}
              </div>
            </div>

            <div style=${{display:"flex",gap:8}}>
              <button onClick=${saveRecurring}
                style=${{flex:1,padding:"11px",borderRadius:10,fontWeight:700,background:C.acc,color:"#0f172a",fontSize:14}}>
                ${recEdit?"💾 Zapisz":"✅ Dodaj"}
              </button>
              ${recEdit&&html`<button onClick=${()=>{setRecEdit(null);setRecForm({name:"",amount:"",category:CATS[4],person:PERSONS[2],day:1,active:true});}}
                style=${{padding:"11px 14px",borderRadius:10,border:`1px solid ${C.bdr}`,color:C.mut,fontWeight:600}}>Anuluj</button>`}
            </div>
          </div>

          <!-- List -->
          ${recurring.length===0&&html`<div style=${{textAlign:"center",padding:"40px 0",color:C.mut}}>
            <div style=${{fontSize:40,marginBottom:8}}>🔄</div>
            <div>Brak subskrypcji. Dodaj pierwszą powyżej.</div>
          </div>`}

          ${[...recurring].sort((a,b)=>+b.active- +a.active||a.name.localeCompare(b.name)).map(r=>{
            const pi=PERSONS.indexOf(r.person); const pc=[C.p1,C.p2,C.sh][pi]||C.mut; const pn=pi<2?names[pi]:"Wspólne";
            return html`<div key=${r.id} class="card" style=${{opacity:r.active?1:.5,border:`1px solid ${r.active?C.bdr:"#334155"}`}}>
              <div style=${{display:"flex",alignItems:"center",gap:12}}>
                <div style=${{fontSize:24}}>${r.category.split(" ")[0]}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:6}}>
                    ${r.name}
                    ${!r.active&&html`<span style=${{fontSize:10,color:C.mut,fontWeight:400,padding:"1px 6px",border:`1px solid ${C.bdr}`,borderRadius:4}}>nieaktywna</span>`}
                  </div>
                  <div style=${{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                    ${tag(pc,pn)}
                    <span style=${{fontSize:11,color:C.mut}}>${r.day}. każdego miesiąca</span>
                  </div>
                </div>
                <div style=${{textAlign:"right",flexShrink:0}}>
                  <div style=${{fontWeight:800,fontSize:15,color:C.exp}}>-${fmt(r.amount)}</div>
                  <div style=${{fontSize:10,color:C.mut}}>/ miesiąc</div>
                </div>
              </div>
              <div style=${{display:"flex",gap:8,marginTop:12,paddingTop:10,borderTop:`1px solid ${C.bdr}`}}>
                <button onClick=${()=>toggleRecurring(r)}
                  style=${{flex:1,padding:"7px",borderRadius:8,fontSize:12,fontWeight:600,border:`1px solid ${r.active?C.exp:C.inc}`,color:r.active?C.exp:C.inc,background:"transparent"}}>
                  ${r.active?"⏸ Dezaktywuj":"▶ Aktywuj"}
                </button>
                <button onClick=${()=>fbSet(`recurring/${r.id}`,{...r,excludeFromSettlement:!r.excludeFromSettlement})}
                  style=${{flex:1,padding:"7px",borderRadius:8,fontSize:11,fontWeight:600,
                    border:`1px solid ${r.excludeFromSettlement?"#8b5cf688":C.bdr}`,
                    color:r.excludeFromSettlement?"#8b5cf6":C.mut,background:r.excludeFromSettlement?"#8b5cf611":"transparent"}}>
                  ${r.excludeFromSettlement?"✅ Poza rozliczeniem":"⚖️ Wyklucz"}
                </button>
                <button onClick=${()=>{setRecEdit(r.id);setRecForm({...r});}}
                  style=${{padding:"7px 12px",borderRadius:8,fontSize:12,fontWeight:600,border:`1px solid ${C.bdr}`,color:C.mut,background:"transparent"}}>✏️</button>
                <button onClick=${()=>deleteRecurring(r)}
                  style=${{padding:"7px 12px",borderRadius:8,fontSize:12,fontWeight:600,border:"1px solid #ef444444",color:C.exp,background:"transparent"}}>🗑️</button>
              </div>
            </div>`;
          })}
        </div>`}

        <!-- SETTINGS -->
        ${view==="settings"&&html`<div class="fa" style=${{display:"flex",flexDirection:"column",gap:12}}>
          <div class="card">
            <div style=${{fontWeight:700,fontSize:15,marginBottom:4}}>⚙️ Ustawienia rozliczenia</div>
            <div style=${{fontSize:12,color:C.mut,marginBottom:16}}>Zaznaczone kategorie <b style=${{color:C.txt}}>nie będą wliczane</b> do wspólnego rozliczenia.</div>
            <div style=${{display:"flex",flexDirection:"column",gap:8}}>
              ${CATS.map(cat=>{
                const ex=Array.isArray(excl)&&excl.includes(cat);
                const newExcl=ex?(Array.isArray(excl)?excl.filter(c=>c!==cat):[]):[...(Array.isArray(excl)?excl:[]),cat];
                return html`<button key=${cat} onClick=${()=>fbSet("excludedCats",newExcl)}
                  style=${{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:12,border:`1px solid ${ex?"#ef444466":C.bdr}`,background:ex?"#2d151522":C.bg}}>
                  <div style=${{display:"flex",alignItems:"center",gap:10}}>
                    <span style=${{fontSize:20}}>${cat.split(" ")[0]}</span>
                    <span style=${{fontSize:14,fontWeight:600,color:ex?C.mut:C.txt}}>${cat.split(" ").slice(1).join(" ")}</span>
                  </div>
                  <div style=${{width:22,height:22,borderRadius:6,border:`2px solid ${ex?C.exp:C.bdr}`,background:ex?C.exp:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    ${ex&&html`<span style=${{color:"#fff",fontSize:13,fontWeight:700}}>✕</span>`}
                  </div>
                </button>`;
              })}
            </div>
            ${Array.isArray(excl)&&excl.length>0&&html`<div style=${{marginTop:14,padding:"10px 12px",borderRadius:10,background:"#2d1515",border:"1px solid #ef444433",fontSize:12,color:"#fca5a5"}}>
              Wykluczone: ${excl.map(c=>c.split(" ")[0]).join(" ")} (${excl.length})
            </div>`}
          </div>
        </div>`}

      </div>
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));
</script>
</body>
</html>
